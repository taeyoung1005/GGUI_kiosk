topic: >-
  목소리 한 마디로 사용자(어르신·아이·외국인·청년)를 인식해 UI가 자동 적응하는
  AI 음성 키오스크 구현 — OBA Weekend-thon S1 (GGUI + EXAONE/Voice AI 활용, 1박2일)

# 리서치 목적: 이 아이디어를 1박2일 해커톤 안에서 실제로 빌딩하기 위해
# 각 기술/리소스 구성요소의 실재·접근방법·제약·해커톤 적합성·트랙 요건 충족 여부를 검증한다.
# (Step 1 모델 지식 + Step 2 웹검색 보강 병합 결과)

meta:
  event: OBA Weekend-thon Season 1
  date: 2026-05-30 ~ 2026-05-31 (24h build)
  venue: 카카오 AI 캠퍼스 (용인 수지)
  target_tracks:
    - GGUI 트랙 (100만원) — 적응형 UI
    - LG U+ 트랙 (100만원) — "Voice AI + EXAONE 필수"
  core_pipeline: >-
    마이크 → Silero VAD(발화 트리거) → STT(언어식별+전사) →
    음성 연령·성별 추정 → EXAONE(의도해석·UI프롬프트) →
    GGUI MCP(적응형 UI 생성/렌더) → TTS(음성 안내)
  key_findings_from_search:
    - "GGUI 실재 확인: github.com/ggui-ai/ggui (Apache 2.0), mcp.ggui.ai, 출력=blueprint, BYOK"
    - "EXAONE은 text-only(음성 모델 아님) → STT/TTS 별도 결합으로 'Voice AI' 조건 충족"
    - "LG U+ 'Voice AI' = ixi/익시오(ixi-O) 제품군; 공개 음성 오픈모델 제공 아님 → 주최 원문 확인 필요"
    - "EXAONE·audeering 모두 NC(비상업) 라이선스; 사업화 시 EXAONE은 FriendliAI 상업 API 경로"
    - "audeering wav2vec2 연령·성별: zero-shot 즉시 사용 가능(fine-tuning 불필요)하나 영어학습·아동/한국어 미검증"
    - "AIHub 데이터셋: 휴대폰 본인인증·승인지연 → 1박2일 즉시 사용/fine-tuning 비현실적"

items:
  - id: 1
    name: GGUI (Generative GUI MCP)
    role: 적응형 UI 자동 생성 — 핵심 엔진 (GGUI 트랙 직결)
    seed: >-
      공식 레포 github.com/ggui-ai/ggui (Apache 2.0), 사이트 ggui.ai, 문서 docs.ggui.ai,
      MCP 서버 'npx ggui serve' 또는 호스티드 mcp.ggui.ai, 콘솔 console.ggui.ai,
      호스티드 인프라 Guuey/guuey.com. 출력 단위=blueprint(typed data contract에 바인딩된 UI),
      React/React Native 렌더러, BYOK(Claude/OpenAI/Gemini).
      스캐폴딩: npm create ggui-server@latest / npx create-ggui-agent --framework claude-sdk.

  - id: 2
    name: EXAONE 오픈 모델 (LLM, text-only)
    role: 사용자 의도 해석 + UI 생성 프롬프트 작성 LLM (LG U+ 트랙 EXAONE 요건)
    seed: >-
      EXAONE 4.0(32B, text-only), EXAONE 4.0-1.2B(온디바이스), EXAONE 4.5-33B(2026-04, 비전 VLM).
      HuggingFace LGAI-EXAONE/*. 라이선스 EXAONE AI Model License 1.2-NC(비상업).
      native 오디오/STT/TTS 없음 — 텍스트 LLM 역할에 한정.

  - id: 3
    name: EXAONE 배포 경로 (FriendliAI API + 온디바이스 1.2B GGUF)
    role: 1박2일·GPU 제약 대응 + 상업 라이선스 경로
    seed: >-
      로컬 32B 서빙은 GPU 부담 → FriendliAI 상업 API(friendli.ai, 2025-07 파트너십)가 현실적.
      네트워크 불안정 대비 EXAONE-4.0-1.2B-GGUF 노트북 로컬 구동 옵션.

  - id: 4
    name: LG U+ Voice AI (ixi/ixi-O) 정체 & 트랙 요건 해석
    role: "Voice AI + EXAONE 필수" 조건의 현실적 충족안 도출 (수상 직결)
    seed: >-
      LG U+ 'Voice AI'=ixi/익시오(ixi-O) — EXAONE 기반 통신특화 AI 브랜드, 음성은 별도 스택
      (안티딥보이스·화자식별·음색분석). 공개 STT/TTS 오픈모델 제공은 미확인.
      ★주최 공지/등록페이지/Telegram @oba_run에서 트랙 정확한 문구·LG U+ 제공 음성 API 여부 원문 확인 필수.

  - id: 5
    name: STT 레이어 (Whisper large-v3 / Naver CLOVA Speech)
    role: 발화 언어 자동 식별(외국인 분기) + 텍스트 전사
    seed: >-
      Whisper large-v3: 99개 언어 LID+STT 동시(detected_language로 외국인 분기), 오픈.
      한국어 정확도·실시간 우선 시 Naver CLOVA Speech(한국어 최고 인식률, 실시간 스트리밍, 무료 체험 쿼터).
      별도 lingua/fastText LID는 중복 — 저신뢰 시에만 폴백.

  - id: 6
    name: TTS 레이어 (CLOVA Voice / MeloTTS / Orpheus)
    role: 어르신·아이 대상 음성 안내 출력
    seed: >-
      CLOVA Voice(방송급 한국어) 또는 오픈소스 MeloTTS/Orpheus TTS(한국어 지원·실시간).
      "한 마디로 인식 → 음성으로 되묻기/안내" UX 완성용.

  - id: 7
    name: Silero VAD (발화 트리거)
    role: "목소리 한 마디"로 인식 시작/종료 — 누락됐던 핵심 게이트
    seed: >-
      브라우저/ONNX 실시간 VAD, 16kHz, 500ms 무음으로 발화 종료 감지.
      Web Audio 캡처와 STT 사이에 위치. whisper.cpp WASM과 결합 가능.

  - id: 8
    name: 음성 연령·성별 추정 (audeering wav2vec2)
    role: 어르신/아이/청년/중장년 분류 → UI 분기
    seed: >-
      audeering/wav2vec2-large-robust-24-ft-age-gender. 0.3B, 16kHz raw audio 입력,
      출력=age(0~1→0~100세)+{child/female/male} 확률. MAE 7.1~10.8년, gender ACC≥91%.
      ★zero-shot 즉시 사용(fine-tuning 불필요)★ 단 영어(CommonVoice/TIMIT/VoxCeleb2) 학습,
      CC-BY-NC-SA-4.0(비상업), 한국어/아동 성능 비보장. 6-layer 경량판(실시간 유리) 존재.

  - id: 9
    name: 아동·노인 연령 정확도 & 룰 기반 보정
    role: 타깃 정확도 비대칭 리스크 완화 (데모 신뢰성)
    seed: >-
      arXiv 2508.10332(2025-08) 아동 음성 연령/성별 레이어별 분석 — 성인중심 모델의 아동 저성능과 개선법.
      보정안: STT 텍스트의 어휘·문장길이·발화속도 휴리스틱을 audeering 점수와 병합하는 룰 기반 fusion.

  - id: 10
    name: AIHub 한국어 음성 데이터셋 (노인/소아)
    role: 사후 정확도 개선용 (해커톤 당일은 비현실적)
    seed: >-
      "명령어 음성(노인남녀)", "자유대화 음성(소아·유아)", 한국어 아동 음성 데이터.
      ★휴대폰 본인인증 필수 → 외국인/즉시 사용 불가, 승인 지연, 1박2일 내 fine-tuning 비현실적.
      데모는 zero-shot로, AIHub는 로드맵(사후 개선)으로 포지셔닝.

  - id: 11
    name: MCP 통합 아키텍처 (Claude Agent SDK + GGUI MCP + EXAONE BYOK)
    role: 전체 파이프라인을 웹 데모/클라이언트로 연결
    seed: >-
      GGUI는 MCP 서버 → 클라이언트(Claude Desktop/Cursor/Claude Agent SDK/LangGraph/Mastra)에
      mcpServers:{ggui:{command:"npx",args:["ggui","serve"]}} 등록.
      자체 웹 데모는 Claude Agent SDK + GGUI MCP 구성, EXAONE을 BYOK LLM으로 주입이 가장 직접적.

  - id: 12
    name: 브라우저 오디오 캡처 & 온디바이스 경량 데모
    role: 웹 데모 마이크 입력 + 네트워크 실패 폴백
    seed: >-
      Web Audio API / MediaRecorder로 마이크 캡처. 온디바이스 단독 데모 옵션:
      EXAONE-4.0-1.2B-GGUF + whisper.cpp(WASM 브라우저 실시간) + audeering 6-layer.
      행사장 네트워크 불안정 대비책.

  - id: 13
    name: 국내 배리어프리·고령자 키오스크 선행 솔루션
    role: 경쟁/차별점 — "음성으로 모드 자동 전환"의 신규성 입증
    seed: >-
      무인민원·고령자 친화 키오스크, 음성 주문 키오스크 등. 대부분 '모드 버튼 선택' 방식 →
      본 아이디어의 차별점="사용자가 모드를 고르지 않아도 말 한마디로 자동 적응".

  - id: 14
    name: 음성 기반 적응형 UI 선행 연구/제품
    role: 학술 근거 + 차별점 보강
    seed: >-
      Adapting Voice Assistant Tech for Older Adults(MDPI 2025),
      Adaptive/Accessible UIs for Seniors via Model-Driven Engineering(Springer 2025).
      voice-driven adaptive UI / age-adaptive interface 선행연구로 정당성·차별성 확보.

execution:
  batch_size: 7          # 동시 실행 에이전트 수
  items_per_agent: 2     # 에이전트당 담당 item 수 (14개 → 7 에이전트)
  output_dir: ./results  # 심층 리서치 결과 출력 디렉토리
